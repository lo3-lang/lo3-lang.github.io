<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>lo3</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d0d;
      color: #eee;
      font-family: monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 1rem;
    }
    h1 { font-size: 4rem; color: #a78bfa; }
    p { color: #888; font-size: 1.1rem; }
    .links { display: flex; gap: 1rem; margin-top: 1rem; }
    a {
      padding: 0.5rem 1.5rem;
      border: 1px solid #a78bfa;
      color: #a78bfa;
      text-decoration: none;
      border-radius: 4px;
      transition: 0.2s;
    }
    a:hover { background: #a78bfa; color: #0d0d0d; }
    .playground-link {
      margin-top: 0.5rem;
      font-size: 0.85rem;
      color: #555;
    }
    .playground-link a {
      padding: 0;
      border: none;
      border-radius: 0;
      color: #6d5ea8;
      border-bottom: 1px dashed #6d5ea8;
      font-size: 0.85rem;
    }
    .playground-link a:hover {
      background: transparent;
      color: #a78bfa;
      border-bottom-color: #a78bfa;
    }
  </style>
</head>
<body>
  <h1>lo3</h1>
  <p>a simple interpreted token based programming language written in C</p>
  <div class="links">
    <a href="https://lo3-lang.github.io/learn-the-syntax/">Docs</a>
    <a href="https://github.com/lo3-lang/lo3-core">GitHub</a>
  </div>
  <p class="playground-link">or try it in the <a href="https://lo3-lang.github.io/playground/">playground →</a></p>
</body>
</html>
